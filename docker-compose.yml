# Production / VM — ALL-IN-ONE, single domain with internal proxy.
#
#   Browser ──> web (Next.js, public)  ──/api/*──> api (Express, internal only)
#                                                    └──> Postgres (already on the VM)
#
# Only `web` is exposed. The frontend proxies /api/* to `api` over the internal
# Docker network (see frontend/next.config.mjs) => no CORS, backend not public.
#
# Postgres is NOT started here — it already exists on the VM. Set DATABASE_URL
# in .env (use host.docker.internal if Postgres runs on the VM host).
#
# Local dev with a throwaway Postgres: docker compose -f docker-compose.dev.yml up
services:
  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080" # internal only — not published to the host
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: ./frontend
      args:
        # Internal address of the backend, baked into the Next rewrite at build.
        BACKEND_URL: http://api:8080
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
